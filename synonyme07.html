<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Synonyme-Match</title>
    <style>
        :root {
            --colloquial-color: #f39c12;
            --formal-color: #2980b9;
            --success: #27ae60;
            --error: #c0392b;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { margin-bottom: 5px; color: #2d3436; }
        .description { color: #636e72; margin-bottom: 25px; font-size: 0.95rem; }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            min-height: 400px; /* Verhindert Springen des Layouts */
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #b2bec3;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid #dfe6e9;
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
            user-select: none;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card span { font-size: 1.05rem; font-weight: 600; }
        .german-hint { font-style: italic; font-size: 0.85rem; color: #636e72; margin-top: 4px; }

        /* Auswahl-Styles */
        .card.selected-col { background: var(--colloquial-color); color: white; border-color: var(--colloquial-color); transform: scale(1.05); }
        .card.selected-col .german-hint { color: #eee; }
        
        .card.selected-form { background: var(--formal-color); color: white; border-color: var(--formal-color); transform: scale(1.05); }

        /* Gefundene Paare verschwinden */
        .card.matched {
            opacity: 0;
            transform: scale(0.5) rotate(5deg);
            pointer-events: none;
            visibility: hidden;
        }

        .card.error {
            background: var(--error) !important;
            color: white;
            border-color: var(--error);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Lösung-Ansicht */
        .solution-list {
            display: none;
            grid-template-columns: 1fr;
            gap: 10px;
            text-align: left;
            margin: 20px auto;
            max-width: 500px;
        }
        .solution-item {
            padding: 10px;
            background: #f1f2f6;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:active { transform: scale(0.95); }

        .btn-restart { background: #2d3436; color: white; }
        .btn-solution { background: #b2bec3; color: white; }

        #feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }

        @media (max-width: 500px) {
            .game-grid { gap: 10px; min-height: 350px; }
            .card span { font-size: 0.9rem; }
            .german-hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Synonyme-Match</h2>
    <p class="description">Verbinde die Paare. Richtige Pärchen verschwinden vom Feld.</p>

    <div id="game-area">
        <div class="game-grid">
            <div class="column">
                <div class="header">Alltag</div>
                <div id="col-list"></div>
            </div>
            <div class="column">
                <div class="header">Formell</div>
                <div id="form-list"></div>
            </div>
        </div>
    </div>

    <div id="solution-area" class="solution-list"></div>

    <div id="feedback"></div>

    <div class="controls">
        <button class="btn-solution" id="solution-btn" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-restart" onclick="initGame()">Neustart</button>
    </div>
</div>

<script>
    const pairs = [
        { col: "снимать", form: "арендовать", de: "mieten" },
        { col: "коммуналка", form: "коммунальные услуги", de: "Nebenkosten" },
        { col: "риелтор", form: "агент по недвижимости", de: "Makler" },
        { col: "однушка", form: "однокомнатная квартира", de: "1-Zi.-Whg." },
        { col: "двушка", form: "двухкомнатная квартира", de: "2-Zi.-Whg." },
        { col: "въехать", form: "заселиться", de: "einziehen" }
    ];

    let selectedCol = null;
    let selectedForm = null;
    let matchesFound = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        matchesFound = 0;
        selectedCol = null;
        selectedForm = null;
        document.getElementById('feedback').textContent = "";
        document.getElementById('game-area').style.display = "block";
        document.getElementById('solution-area').style.display = "none";
        document.getElementById('solution-btn').style.display = "block";

        const colList = document.getElementById('col-list');
        const formList = document.getElementById('form-list');
        colList.innerHTML = "";
        formList.innerHTML = "";

        shuffle([...pairs]).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span>${p.col}</span><span class="german-hint">(${p.de})</span>`;
            card.onclick = () => selectCard(card, 'col', p.col);
            colList.appendChild(card);
        });

        shuffle([...pairs]).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span>${p.form}</span>`;
            card.onclick = () => selectCard(card, 'form', p.col);
            formList.appendChild(card);
        });
    }

    function selectCard(card, type, id) {
        if (card.classList.contains('matched')) return;

        if (type === 'col') {
            document.querySelectorAll('#col-list .card').forEach(c => c.classList.remove('selected-col'));
            if (selectedCol && selectedCol.card === card) { selectedCol = null; card.classList.remove('selected-col'); }
            else { selectedCol = { card, id }; card.classList.add('selected-col'); }
        } else {
            document.querySelectorAll('#form-list .card').forEach(c => c.classList.remove('selected-form'));
            if (selectedForm && selectedForm.card === card) { selectedForm = null; card.classList.remove('selected-form'); }
            else { selectedForm = { card, id }; card.classList.add('selected-form'); }
        }

        if (selectedCol && selectedForm) checkMatch();
    }

    function checkMatch() {
        if (selectedCol.id === selectedForm.id) {
            const c = selectedCol.card;
            const f = selectedForm.card;
            setTimeout(() => {
                c.classList.add('matched');
                f.classList.add('matched');
                matchesFound++;
                if (matchesFound === pairs.length) {
                    document.getElementById('feedback').textContent = "Hervorragend! Alle Paare gefunden. 🎉";
                    document.getElementById('feedback').style.color = "var(--success)";
                }
            }, 200);
            selectedCol = null;
            selectedForm = null;
        } else {
            const c = selectedCol.card;
            const f = selectedForm.card;
            c.classList.add('error');
            f.classList.add('error');
            setTimeout(() => {
                c.classList.remove('error', 'selected-col');
                f.classList.remove('error', 'selected-form');
            }, 500);
            selectedCol = null;
            selectedForm = null;
        }
    }

    function showSolution() {
        const solArea = document.getElementById('solution-area');
        solArea.innerHTML = "<h3 style='text-align:center'>Lösung:</h3>";
        pairs.forEach(p => {
            solArea.innerHTML += `<div class="solution-item">
                <strong>${p.col}</strong> <em>(${p.de})</em> 
                <span>➔</span> 
                <strong>${p.form}</strong>
            </div>`;
        });
        document.getElementById('game-area').style.display = "none";
        solArea.style.display = "grid";
        document.getElementById('solution-btn').style.display = "none";
        document.getElementById('feedback').textContent = "Hier kannst du die Begriffe studieren.";
        document.getElementById('feedback').style.color = "var(--formal-color)";
    }

    initGame();
</script>

</body>
</html>
